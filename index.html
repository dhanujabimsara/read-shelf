<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Reading Shelf | Your Personal Library Explorer</title>
  <!-- Tailwind CSS v3 + Font Awesome + Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'sans': ['Inter', 'system-ui', 'Segoe UI', 'sans-serif'],
          },
          animation: {
            'fade-in': 'fadeIn 0.4s ease-out',
            'slide-in': 'slideIn 0.3s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(8px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            slideIn: {
              '0%': { transform: 'translateX(100%)' },
              '100%': { transform: 'translateX(0)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    .search-focus:focus {
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
      border-color: #8b5cf6;
      outline: none;
    }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .sidebar-open {
      animation: slideIn 0.3s ease-out;
    }
    /* Custom scrollbar for sidebar */
    .custom-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scroll::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }
    .custom-scroll::-webkit-scrollbar-thumb {
      background: #d6d3d1;
      border-radius: 10px;
    }
    .custom-scroll::-webkit-scrollbar-thumb:hover {
      background: #a8a29e;
    }
  </style>
</head>
<body class="font-sans antialiased bg-gradient-to-br from-stone-50 to-amber-50/30">

  <!-- Main App Container -->
  <div id="app"></div>

  <script>
    // ==================== BOOK DATABASE ====================
    const booksData = [
      { id: 1, title: "To Kill a Mockingbird", author: "Harper Lee", cover: "https://covers.openlibrary.org/b/id/8224984-L.jpg", fallback: "https://via.placeholder.com/200x300?text=To+Kill+a+Mockingbird", publicationYear: 1960, genre: "Classic Fiction", description: "A gripping, heart-wrenching, and wholly remarkable tale of coming-of-age in a South poisoned by virulent prejudice. Through the eyes of young Scout Finch, we witness the trial of a black man accused of raping a white woman—a trial that will change her family and her town forever." },
      { id: 2, title: "1984", author: "George Orwell", cover: "https://covers.openlibrary.org/b/id/8292394-L.jpg", fallback: "https://via.placeholder.com/200x300?text=1984", publicationYear: 1949, genre: "Dystopian", description: "A dystopian social science fiction novel that examines the consequences of totalitarianism, mass surveillance, and repressive regimentation." },
      { id: 3, title: "Pride and Prejudice", author: "Jane Austen", cover: "https://covers.openlibrary.org/b/id/8211451-L.jpg", fallback: "https://via.placeholder.com/200x300?text=Pride+and+Prejudice", publicationYear: 1813, genre: "Romance", description: "A novel of manners that follows the character development of Elizabeth Bennet, who learns about the repercussions of hasty judgments." },
      { id: 4, title: "The Great Gatsby", author: "F. Scott Fitzgerald", cover: "https://covers.openlibrary.org/b/id/8224362-L.jpg", fallback: "https://via.placeholder.com/200x300?text=Great+Gatsby", publicationYear: 1925, genre: "Classic", description: "Set in the Jazz Age on Long Island, the novel depicts narrator Nick Carraway's interactions with mysterious millionaire Jay Gatsby." },
      { id: 5, title: "Moby-Dick", author: "Herman Melville", cover: "https://covers.openlibrary.org/b/id/8222388-L.jpg", fallback: "https://via.placeholder.com/200x300?text=Moby-Dick", publicationYear: 1851, genre: "Adventure", description: "The saga of Captain Ahab's obsessive quest to kill the white whale that on a previous voyage bit off his leg." },
      { id: 6, title: "The Catcher in the Rye", author: "J.D. Salinger", cover: "https://covers.openlibrary.org/b/id/8231612-L.jpg", fallback: "https://via.placeholder.com/200x300?text=Catcher+in+the+Rye", publicationYear: 1951, genre: "Coming-of-age", description: "A story of teenage rebellion and alienation, narrated by Holden Caulfield." },
      { id: 7, title: "Dune", author: "Frank Herbert", cover: "https://covers.openlibrary.org/b/id/8224069-L.jpg", fallback: "https://via.placeholder.com/200x300?text=Dune", publicationYear: 1965, genre: "Science Fiction", description: "Set in the distant future amidst a feudal interstellar society, it tells the story of young Paul Atreides." },
      { id: 8, title: "The Hobbit", author: "J.R.R. Tolkien", cover: "https://covers.openlibrary.org/b/id/8279696-L.jpg", fallback: "https://via.placeholder.com/200x300?text=The+Hobbit", publicationYear: 1937, genre: "Fantasy", description: "A fantasy novel about the adventures of Bilbo Baggins, a hobbit who is recruited by the wizard Gandalf." },
      { id: 9, title: "Fahrenheit 451", author: "Ray Bradbury", cover: "https://covers.openlibrary.org/b/id/8547520-L.jpg", fallback: "https://via.placeholder.com/200x300?text=Fahrenheit+451", publicationYear: 1953, genre: "Dystopian", description: "In a future society where books are banned, fireman Guy Montag begins to question his role." },
      { id: 10, title: "Jane Eyre", author: "Charlotte Brontë", cover: "https://covers.openlibrary.org/b/id/8224966-L.jpg", fallback: "https://via.placeholder.com/200x300?text=Jane+Eyre", publicationYear: 1847, genre: "Gothic Romance", description: "A novel that follows the experiences of its eponymous heroine, including her love for Mr. Rochester." },
      { id: 11, title: "The Alchemist", author: "Paulo Coelho", cover: "https://covers.openlibrary.org/b/id/8267047-L.jpg", fallback: "https://via.placeholder.com/200x300?text=The+Alchemist", publicationYear: 1988, genre: "Philosophical Fiction", description: "A mystical story of Santiago, an Andalusian shepherd boy who yearns to travel in search of a worldly treasure." },
      { id: 12, title: "Sapiens", author: "Yuval Noah Harari", cover: "https://covers.openlibrary.org/b/id/8275380-L.jpg", fallback: "https://via.placeholder.com/200x300?text=Sapiens", publicationYear: 2011, genre: "Non-fiction", description: "A brief history of humankind, from the emergence of Homo sapiens to the present day." }
    ];

    // Helper: load wishlist from localStorage
    function loadWishlist() {
      const saved = localStorage.getItem('readingShelf_wishlist');
      return saved ? JSON.parse(saved) : [];
    }

    function saveWishlist(wishlist) {
      localStorage.setItem('readingShelf_wishlist', JSON.stringify(wishlist));
    }

    // Check if book is in wishlist
    function isBookInWishlist(bookId, wishlist) {
      return wishlist.some(b => b.id === bookId);
    }

    // Add/remove book from wishlist
    function toggleWishlist(book, currentWishlist) {
      const exists = currentWishlist.some(b => b.id === book.id);
      let newWishlist;
      if (exists) {
        newWishlist = currentWishlist.filter(b => b.id !== book.id);
      } else {
        newWishlist = [...currentWishlist, book];
      }
      saveWishlist(newWishlist);
      return newWishlist;
    }

    // ==================== RENDER APP ====================
    let currentSearchQuery = '';
    let currentWishlist = loadWishlist();
    let isSidebarOpen = false;

    function render() {
      const app = document.getElementById('app');
      if (!app) return;

      // Filter books based on search
      const filteredBooks = currentSearchQuery.trim() === '' 
        ? booksData 
        : booksData.filter(book => 
            book.title.toLowerCase().includes(currentSearchQuery.toLowerCase()) ||
            book.author.toLowerCase().includes(currentSearchQuery.toLowerCase())
          );

      app.innerHTML = `
        <!-- Navbar -->
        <nav class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-stone-200">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
              <div class="flex items-center gap-2 cursor-pointer group" onclick="scrollToTop()">
                <i class="fas fa-book-open text-amber-600 text-xl group-hover:scale-110 transition"></i>
                <span class="font-bold text-xl bg-gradient-to-r from-stone-800 to-stone-600 bg-clip-text text-transparent">Reading Shelf</span>
              </div>
              <div class="flex items-center gap-2">
                <button onclick="openWishlistPage()" class="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-full text-stone-600 hover:bg-stone-100 transition text-sm">
                  <i class="fas fa-list"></i>
                  <span>Wishlist</span>
                </button>
                <button onclick="toggleSidebar()" class="relative p-2 rounded-full hover:bg-stone-100 transition text-stone-600 hover:text-amber-600">
                  <i class="fas fa-bookmark text-xl"></i>
                  <span id="wishlistBadge" class="absolute -top-1 -right-1 bg-amber-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">${currentWishlist.length > 9 ? '9+' : currentWishlist.length}</span>
                </button>
              </div>
            </div>
          </div>
        </nav>

        <!-- Main Content -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12">
          <!-- Hero Section -->
          <header class="text-center mb-12 md:mb-16">
            <div class="inline-flex items-center gap-2 bg-white/70 backdrop-blur-sm rounded-full px-4 py-1.5 shadow-sm border border-amber-200/50 mb-5">
              <i class="fas fa-book-open text-amber-600 text-sm"></i>
              <span class="text-xs font-medium text-stone-600 tracking-wide">curated reading list</span>
            </div>
            <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold tracking-tight bg-gradient-to-r from-stone-800 via-stone-700 to-amber-800 bg-clip-text text-transparent mb-4">
              Discover Your Next Chapter
            </h1>
            <p class="text-stone-500 max-w-2xl mx-auto text-base md:text-lg">
              Search by title or author, save books you want to read, and build your personal wishlist.
            </p>
          </header>

          <!-- Search Bar -->
          <div class="max-w-2xl mx-auto w-full mb-12 md:mb-16">
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i class="fas fa-search text-stone-400 group-focus-within:text-indigo-500 transition-colors"></i>
              </div>
              <input type="text" id="searchInput" value="${escapeHtml(currentSearchQuery)}" placeholder="Search by book title or author..." 
                class="search-focus w-full pl-12 pr-24 py-4 rounded-2xl border border-stone-200 bg-white/80 backdrop-blur-sm shadow-sm text-stone-700 placeholder-stone-400 focus:bg-white transition-all duration-200 text-base md:text-lg font-medium">
              <div class="absolute inset-y-0 right-0 flex items-center pr-2">
                <button id="clearSearchBtn" class="${currentSearchQuery ? '' : 'hidden'} text-stone-400 hover:text-stone-600 p-2 rounded-full transition">
                  <i class="fas fa-times-circle text-lg"></i>
                </button>
              </div>
            </div>
            <div class="mt-2 flex justify-between items-center">
              <p class="text-xs text-stone-400"><i class="fas fa-lightbulb mr-1"></i> Try "Jane Austen", "Dune", or "1984"</p>
              <p id="resultCount" class="text-xs font-medium text-stone-500 bg-white/50 px-3 py-0.5 rounded-full">${filteredBooks.length} ${filteredBooks.length === 1 ? 'book' : 'books'}</p>
            </div>
          </div>

          <!-- Books Grid -->
          <div id="booksGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-7 auto-rows-fr transition-all duration-300">
            ${filteredBooks.length === 0 ? `
              <div class="col-span-full flex flex-col items-center justify-center text-center py-16 px-4 rounded-2xl bg-white/40 backdrop-blur-sm border border-dashed border-stone-200">
                <i class="fas fa-book-open text-5xl text-stone-300 mb-4"></i>
                <h3 class="text-xl font-semibold text-stone-600">No matching books found</h3>
                <p class="text-stone-400 max-w-sm mt-1">Try adjusting your search or browse our collection ✨</p>
                <button id="resetBrowseBtn" class="mt-4 px-5 py-2 bg-amber-100 hover:bg-amber-200 text-amber-800 rounded-full text-sm font-medium transition shadow-sm">Browse all books</button>
              </div>
            ` : filteredBooks.map(book => renderBookCard(book, currentWishlist)).join('')}
          </div>

          <!-- Footer -->
          <footer class="mt-20 text-center border-t border-stone-200/60 pt-8 pb-6 text-stone-400 text-sm">
            <div class="flex justify-center gap-5 mb-3">
              <i class="fas fa-bookmark text-amber-400/70"></i>
              <i class="fas fa-feather-alt text-stone-400/70"></i>
              <i class="fas fa-shelf text-amber-500/60"></i>
            </div>
            <p>📚 Reading Shelf — your personal library explorer. Save books to your wishlist and never forget what to read next.</p>
          </footer>
        </div>

        <!-- Wishlist Sidebar Overlay -->
        ${isSidebarOpen ? `
          <div class="fixed inset-0 bg-black/50 z-40 transition-opacity duration-300" onclick="toggleSidebar()"></div>
          <div class="fixed top-0 right-0 h-full w-full sm:w-96 bg-white shadow-2xl z-50 flex flex-col sidebar-open">
            <div class="flex items-center justify-between p-4 border-b border-stone-200 bg-gradient-to-r from-amber-50 to-stone-50">
              <div class="flex items-center gap-2">
                <i class="fas fa-bookmark text-amber-600 text-xl"></i>
                <h2 class="text-lg font-bold text-stone-800">Want to Read</h2>
                <span class="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full">${currentWishlist.length}</span>
              </div>
              <button onclick="toggleSidebar()" class="p-2 rounded-full hover:bg-stone-200 transition">
                <i class="fas fa-times text-stone-500"></i>
              </button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 custom-scroll">
              ${currentWishlist.length === 0 ? `
                <div class="flex flex-col items-center justify-center h-full text-center">
                  <i class="fas fa-book-open text-5xl text-stone-300 mb-4"></i>
                  <p class="text-stone-400">Your wishlist is empty</p>
                  <p class="text-stone-300 text-sm mt-1">Click the bookmark button on any book to add it here</p>
                </div>
              ` : `
                <div class="space-y-3">
                  ${currentWishlist.map(book => `
                    <div class="flex gap-3 p-3 bg-stone-50 rounded-xl hover:shadow-md transition group">
                      <div class="flex-shrink-0 w-16 h-24 rounded-md overflow-hidden bg-stone-200 cursor-pointer" onclick="showBookDetails(${book.id})">
                        <img src="${book.cover || book.fallback}" alt="${book.title}" class="w-full h-full object-cover" onerror="this.src='${book.fallback}'">
                      </div>
                      <div class="flex-1 min-w-0">
                        <h3 class="font-semibold text-stone-800 text-sm line-clamp-2 cursor-pointer hover:text-amber-600 transition" onclick="showBookDetails(${book.id})">${escapeHtml(book.title)}</h3>
                        <p class="text-xs text-stone-400 mt-1">${escapeHtml(book.author)}</p>
                        <button onclick="removeFromWishlist(${book.id})" class="text-xs text-red-400 hover:text-red-600 mt-2 transition flex items-center gap-1">
                          <i class="fas fa-trash-alt text-xs"></i> Remove
                        </button>
                      </div>
                    </div>
                  `).join('')}
                </div>
              `}
            </div>
            <div class="p-4 border-t border-stone-200 bg-stone-50">
              <button onclick="openWishlistPage()" class="block w-full text-center py-2.5 bg-amber-600 hover:bg-amber-700 text-white rounded-full font-medium transition shadow-sm">
                View Full Wishlist Page
              </button>
            </div>
          </div>
        ` : ''}

        <!-- Book Detail Modal -->
        <div id="bookModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4" style="background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);">
          <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl animate-fade-in">
            <div id="modalContent" class="p-6"></div>
          </div>
        </div>
      `;

      // Attach event listeners after rendering
      const searchInput = document.getElementById('searchInput');
      if (searchInput) {
        searchInput.addEventListener('input', (e) => {
          currentSearchQuery = e.target.value;
          render();
        });
      }

      const clearBtn = document.getElementById('clearSearchBtn');
      if (clearBtn) {
        clearBtn.addEventListener('click', () => {
          currentSearchQuery = '';
          render();
        });
      }

      const resetBtn = document.getElementById('resetBrowseBtn');
      if (resetBtn) {
        resetBtn.addEventListener('click', () => {
          currentSearchQuery = '';
          render();
        });
      }
    }

    // Render a single book card
    function renderBookCard(book, wishlist) {
      const isSaved = wishlist.some(b => b.id === book.id);
      return `
        <div class="book-card bg-white rounded-2xl overflow-hidden shadow-md border border-stone-100 transition-all duration-300 hover:shadow-xl hover:-translate-y-1 flex flex-col h-full cursor-pointer group relative">
          <button onclick="event.stopPropagation(); toggleWishlistUI(${book.id})" 
            class="absolute top-3 right-3 z-10 p-2 rounded-full backdrop-blur-sm transition-all duration-200 ${isSaved ? 'bg-amber-500 text-white shadow-lg scale-110' : 'bg-white/90 text-stone-500 hover:bg-amber-100 hover:text-amber-600'}">
            <i class="${isSaved ? 'fas fa-bookmark' : 'far fa-bookmark'} text-sm"></i>
          </button>
          <div onclick="showBookDetails(${book.id})" class="relative aspect-[2/3] overflow-hidden bg-gradient-to-br from-stone-100 to-stone-200">
            <img src="${book.cover || book.fallback}" alt="${book.title}" class="w-full h-full object-cover transition duration-300 group-hover:scale-105" onerror="this.src='${book.fallback}'">
            <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition duration-200"></div>
          </div>
          <div onclick="showBookDetails(${book.id})" class="p-5 flex flex-col flex-grow">
            <h3 class="font-bold text-stone-800 text-lg leading-tight line-clamp-2 min-h-[3.2rem]">${escapeHtml(book.title)}</h3>
            <div class="flex items-center gap-1.5 mt-2 text-amber-600">
              <i class="fas fa-user-pen text-xs opacity-80"></i>
              <p class="text-sm font-medium text-stone-500 tracking-wide">${escapeHtml(book.author)}</p>
            </div>
            <div class="mt-4 flex items-center justify-between">
              <span class="text-xs text-stone-400 flex items-center gap-1"><i class="far fa-calendar-alt"></i> ${book.publicationYear || 'N/A'}</span>
              <span class="text-indigo-500 text-sm font-medium opacity-0 group-hover:opacity-100 transition-opacity">details →</span>
            </div>
          </div>
        </div>
      `;
    }

    // UI Functions
    function toggleWishlistUI(bookId) {
      const book = booksData.find(b => b.id === bookId);
      if (!book) return;
      currentWishlist = toggleWishlist(book, currentWishlist);
      render();
    }

    function removeFromWishlist(bookId) {
      currentWishlist = currentWishlist.filter(b => b.id !== bookId);
      saveWishlist(currentWishlist);
      render();
    }

    function toggleSidebar() {
      isSidebarOpen = !isSidebarOpen;
      render();
    }

    function openWishlistPage() {
      isSidebarOpen = false;
      renderWishlistPage();
    }

    function showBookDetails(bookId) {
      const book = booksData.find(b => b.id === bookId);
      if (!book) return;
      
      const modal = document.getElementById('bookModal');
      const modalContent = document.getElementById('modalContent');
      const isSaved = currentWishlist.some(b => b.id === book.id);
      
      modalContent.innerHTML = `
        <div class="flex justify-between items-start mb-4">
          <h2 class="text-2xl font-bold text-stone-800">${escapeHtml(book.title)}</h2>
          <button onclick="closeModal()" class="text-stone-400 hover:text-stone-600 text-xl">&times;</button>
        </div>
        <div class="flex flex-col md:flex-row gap-6">
          <div class="flex-shrink-0 w-48 mx-auto md:mx-0">
            <img src="${book.cover || book.fallback}" alt="${book.title}" class="w-full rounded-lg shadow-md" onerror="this.src='${book.fallback}'">
          </div>
          <div class="flex-1 space-y-3">
            <p class="text-amber-600 font-medium"><i class="fas fa-user-pen mr-2"></i>${escapeHtml(book.author)}</p>
            <div class="flex gap-4 text-sm">
              <span class="bg-stone-100 px-3 py-1 rounded-full">📅 ${book.publicationYear || 'Unknown'}</span>
              <span class="bg-stone-100 px-3 py-1 rounded-full">🏷️ ${book.genre || 'General'}</span>
            </div>
            <p class="text-stone-600 leading-relaxed">${escapeHtml(book.description || 'No description available.')}</p>
            <div class="flex gap-3 pt-2">
              <button onclick="closeModal(); toggleWishlistUI(${book.id})" class="px-5 py-2 rounded-full font-medium transition flex items-center gap-2 ${isSaved ? 'bg-amber-100 text-amber-800 border border-amber-300' : 'bg-amber-600 hover:bg-amber-700 text-white'}">
                <i class="${isSaved ? 'fas fa-check' : 'far fa-bookmark'}"></i>
                ${isSaved ? 'Saved to Wishlist' : 'Want to Read'}
              </button>
              <button onclick="closeModal()" class="px-5 py-2 border border-stone-300 rounded-full hover:border-amber-400 transition">Close</button>
            </div>
          </div>
        </div>
      `;
      
      modal.style.display = 'flex';
    }

    function closeModal() {
      const modal = document.getElementById('bookModal');
      if (modal) modal.style.display = 'none';
    }

    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Full Wishlist Page View (replaces main view)
    function renderWishlistPage() {
      const app = document.getElementById('app');
      if (!app) return;
      
      app.innerHTML = `
        <nav class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-stone-200">
          <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
              <div class="flex items-center gap-2 cursor-pointer" onclick="goToHome()">
                <i class="fas fa-arrow-left text-stone-600 hover:text-amber-600 transition"></i>
                <span class="font-bold text-xl bg-gradient-to-r from-stone-800 to-stone-600 bg-clip-text text-transparent">Back to Home</span>
              </div>
              <div class="flex items-center gap-2">
                <span class="text-sm text-stone-500"><i class="fas fa-bookmark text-amber-500"></i> My Wishlist</span>
              </div>
            </div>
          </div>
        </nav>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12">
          <div class="flex justify-between items-center flex-wrap gap-4 mb-8">
            <div>
              <h1 class="text-3xl md:text-4xl font-bold text-stone-800 flex items-center gap-3">
                <i class="fas fa-bookmark text-amber-500"></i>
                My Wishlist
              </h1>
              <p class="text-stone-500 mt-2">${currentWishlist.length} ${currentWishlist.length === 1 ? 'book' : 'books'} you want to read</p>
            </div>
            ${currentWishlist.length > 0 ? `
              <button onclick="clearAllWishlist()" class="px-4 py-2 text-red-500 hover:text-red-700 border border-red-200 hover:border-red-300 rounded-full text-sm transition flex items-center gap-2">
                <i class="fas fa-trash-alt"></i> Clear All
              </button>
            ` : ''}
          </div>
          
          ${currentWishlist.length === 0 ? `
            <div class="flex flex-col items-center justify-center text-center py-20 px-4 rounded-2xl bg-white/40 backdrop-blur-sm border border-dashed border-stone-200">
              <div class="w-24 h-24 bg-amber-100 rounded-full flex items-center justify-center mb-6">
                <i class="fas fa-bookmark text-3xl text-amber-400"></i>
              </div>
              <h2 class="text-2xl font-semibold text-stone-600 mb-2">Your wishlist is empty</h2>
              <p class="text-stone-400 max-w-sm mb-6">Start adding books you want to read by clicking the bookmark button on any book.</p>
              <button onclick="goToHome()" class="px-6 py-3 bg-amber-600 hover:bg-amber-700 text-white rounded-full font-medium transition shadow-md">Browse Books</button>
            </div>
          ` : `
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-7">
              ${currentWishlist.map(book => `
                <div class="group relative bg-white rounded-2xl overflow-hidden shadow-md border border-stone-100 hover:shadow-xl transition-all duration-300 flex flex-col">
                  <button onclick="removeFromWishlist(${book.id}); renderWishlistPage();" class="absolute top-3 right-3 z-10 p-2 rounded-full bg-white/90 backdrop-blur-sm text-red-400 hover:text-red-600 hover:bg-white transition shadow-sm">
                    <i class="fas fa-times text-sm"></i>
                  </button>
                  <div onclick="showBookDetailsFromWishlist(${book.id})" class="relative aspect-[2/3] overflow-hidden cursor-pointer">
                    <img src="${book.cover || book.fallback}" class="w-full h-full object-cover transition group-hover:scale-105" onerror="this.src='${book.fallback}'" alt="${book.title}">
                  </div>
                  <div onclick="showBookDetailsFromWishlist(${book.id})" class="p-5 cursor-pointer">
                    <h3 class="font-bold text-stone-800 text-lg leading-tight line-clamp-2">${escapeHtml(book.title)}</h3>
                    <p class="text-sm text-stone-500 mt-2">${escapeHtml(book.author)}</p>
                    ${book.publicationYear ? `<p class="text-xs text-stone-400 mt-2">${book.publicationYear}</p>` : ''}
                  </div>
                </div>
              `).join('')}
            </div>
          `}
        </div>
        <footer class="text-center border-t border-stone-200/60 pt-8 pb-6 text-stone-400 text-sm max-w-7xl mx-auto">
          <p>📚 Reading Shelf — your personal library explorer.</p>
        </footer>
      `;
    }

    function showBookDetailsFromWishlist(bookId) {
      const book = booksData.find(b => b.id === bookId);
      if (book) {
        showBookDetails(bookId);
      }
    }

    function clearAllWishlist() {
      if (confirm('Are you sure you want to clear your entire wishlist?')) {
        currentWishlist = [];
        saveWishlist(currentWishlist);
        renderWishlistPage();
      }
    }

    function goToHome() {
      currentSearchQuery = '';
      isSidebarOpen = false;
      render();
    }

    // Helper escape HTML
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    // Make functions globally accessible
    window.toggleWishlistUI = toggleWishlistUI;
    window.removeFromWishlist = removeFromWishlist;
    window.toggleSidebar = toggleSidebar;
    window.openWishlistPage = openWishlistPage;
    window.showBookDetails = showBookDetails;
    window.closeModal = closeModal;
    window.scrollToTop = scrollToTop;
    window.goToHome = goToHome;
    window.renderWishlistPage = renderWishlistPage;
    window.clearAllWishlist = clearAllWishlist;
    window.showBookDetailsFromWishlist = showBookDetailsFromWishlist;

    // Initial render
    render();
  </script>
</body>
</html>
